<h1 class="">Ввод места рождения</h1>
<p style="margin-left: 0px">Сведения о месте рождения используются при заполнении анкетных данных, личной карточки Т-2. Они вводятся на основании документа, удостоверяющего личность.</p>
<p style="margin-left: 0px">При вводе сведений указываются следующие данные:</p>
<ul style="margin-left: 20px"><li>Город (село, дер.);</li><li>Район;</li><li>Область;</li><li>Страна.</li></ul><p> </p></body></html>
