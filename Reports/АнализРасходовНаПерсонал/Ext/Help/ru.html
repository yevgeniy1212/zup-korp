<h1>Отчет "Сравнительный анализ расходов на персонал"</h1>
<p class="Usual">Отчет позволяет провести сравнительный анализ планируемых и фактических расходов на персонал.</p>
<p class="Usual">В отчет можно вывести несколько сценариев для сравнения. Сведения о планируемых расходах по каждому сценарию выводятся в отдельных колонках.</p>
