<h1 class="">Данные для отражения в бухучете</h1>
<p style="margin-left: 0px">В отчет выводятся данные, подготовленные документами <a href="Report.ДанныеДляОтраженияВБухучете/Help"><b>Отражение зарплаты в бухучете</b></a>.<br>Данные отчета группируются в разрезе способов отражения и видам расчета. Можно расшифровать суммы по сотрудникам, документам-основаниям, подразделениям и пр.</p>
