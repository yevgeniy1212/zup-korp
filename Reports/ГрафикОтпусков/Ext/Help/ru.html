<h1 class="">График отпусков</h1>
<p style="margin-left: 0px">График отпусков формируется по унифицированной форме согласно зарегистрированным документам <a href="Report.ГрафикОтпусков/Help"><b>График отпусков</b></a> и <a href="Report.ГрафикОтпусков/Help"><b>Перенос отпуска</b></a>.<br>Автоматическое заполнение фактических дат отпусков не предусмотрено.</p>
