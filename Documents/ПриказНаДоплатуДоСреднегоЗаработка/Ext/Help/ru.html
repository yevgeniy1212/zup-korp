<h1 class="">Приказ на доплату до среднего заработка</h1>
<p style="margin-left: 0px">Документ позволяет установить сотруднику доплату до среднего заработка при временном переводе на нижеоплачиваемую работу и в других аналогичных случаях, предусмотренных законодательством или коллективным договором.</p>
