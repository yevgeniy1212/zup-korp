<h1 class="">Возврат из отпуска по уходу</h1>
<p style="margin-left: 0px">Документ предназначен для регистрации прекращения отпуска по уходу за ребенком, зарегистрированного ранее документом <a href="Document.ВозвратИзОтпускаПоУходуЗаРебенком/Help"><b>Отпуск по уходу за ребенком</b></a>. Документ удобно вводить на основании прекращаемого отпуска.</p>
