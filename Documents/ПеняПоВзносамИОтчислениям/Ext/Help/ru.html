<h1 class="">Пеня по взносам и отчислениям</h1>
<p style="margin-left: 0px">Документ предназначен для расчета суммы пени за несвоевременное перечисление обязательных пенсионных взносов, обязательных профессиональных пенсионных взносов, социальных отчислений, взносов и отчислений на ОСМС.</p>
