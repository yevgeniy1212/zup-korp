<h1 class="">Перенос отпуска</h1>
<p style="margin-left: 0px">Документ предназначен для изменения периода отпуска, ранее запланированного в <a href="Document.ПереносОтпуска/Help"><b>Графике отпусков</b></a>. <br>Доступно формирование печатных форм уведомления или заявления о переносе, в зависимости от причины переноса. <br>Документ удобно вводить непосредственно из графика отпусков.</p>
