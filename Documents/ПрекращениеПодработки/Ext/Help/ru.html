<h1 class="">Прекращение подработки</h1>
<p style="margin-left: 0px">Документ предназначен для отмены подработки, ранее назначенной документом <a href="Document.ПрекращениеПодработки/Help"><b>Назначение подработки</b></a>. Прекращать подработку необходимо, если она была назначена без указания срока окончания, или для досрочной отмены подработки, назначенной на определенный срок.</p>
