<h1 class="">Изменение условий исполнительного листа</h1>
<p style="margin-left: 0px">Документ предназначен для изменения условий удержания  с определенной даты, назначенного документом <a href="Document.ИзменениеУсловийИсполнительногоЛиста/Help">Исполнительный лист</a>, а также для его прекращения.<br></p>
<p style="margin-left: 0px">Документ удобно вводить на основании исполнительного листа, условия которого требуется изменить.</p>
