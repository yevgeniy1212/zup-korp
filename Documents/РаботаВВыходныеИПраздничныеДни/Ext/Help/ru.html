<h1 class="">Работа в выходные и праздничные дни</h1>
<p style="margin-left: 0px">Документ предназначен для регистрации факта внепланового выхода сотрудника на работу в выходной или праздничный день, например, для выполнения неотложных и прочих работ.</p>
<p style="margin-left: 0px">Документ доступен, если выбрана соответствующая <a href="DataProcessor.ПанельНастроекЗарплатаКадры.Form.НастройкаНачисленийУдержаний/Help">настройка состава начислений</a>.</p>
