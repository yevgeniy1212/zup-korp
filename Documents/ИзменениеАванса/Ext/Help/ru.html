<h1 class="">Изменение аванса</h1>
<p style="margin-left: 0px">Документ предназначен для массового изменения аванса – всем сотрудникам организации, подразделения или произвольному списку сотрудников.</p>
<p style="margin-left: 0px">Аванс одному сотруднику может быть изменен также с помощью документа <a href="Document.ИзменениеАванса/Help"><b>Изменение оплаты труда</b></a> или <a href="Document.ИзменениеАванса/Help"><b>Кадровый перевод</b></a>.</p>
