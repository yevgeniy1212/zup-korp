<h1 class="">Кассы</h1>
<p style="margin-left: 0px">В справочнике ведется список касс, через которые на предприятии может выплачиваться зарплата. <a href="Catalog.Кассы/Help"><b>Ведомость в кассу</b></a> можно заполнять отдельно для каждой кассы.<br>Касса в программе характеризуются только наименованием.</p>
