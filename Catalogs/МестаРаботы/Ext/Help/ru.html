<p style="margin-left: 0px">В справочнике описываются места работы (станки, печи и т. п.) и начисления, которые полагаются при работе на этом месте.<br>Назначение сотрудников на определенное место работы регистрируется документом <a href="Catalog.МестаРаботы/Help"><b>Изменение мест работы</b></a>.</p>
