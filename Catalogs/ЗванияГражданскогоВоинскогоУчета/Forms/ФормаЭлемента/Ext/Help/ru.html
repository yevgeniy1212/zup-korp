<h1 class="">Воинское звание</h1>
<p style="margin-left: 0px">В справочнике ведется список воинских званий, используемых при ведении в программе гражданского воинского учета.</p>
<h2 style="margin-left: 0px">Карточка звания<br></h2>
<p style="margin-left: 0px">Звание характеризуется только <b>Наименованием</b>. Оно используется для представления звания в отчетности.<br></p>
