<h1 class="">Виды доходов</h1>
<p style="margin-left: 0px">Справочник содержит перечень видов доходов. Справочник используется в качестве классификации видов расчета.</p>
<p style="margin-left: 0px"></p><table border="4"><tr><td>Для корректного расчета заработной платы, налогов, взносов и отчислений рекомендуется в видах расчетов использовать предопределенные виды доходов.</td></tr></table><p> </p></body></html>
