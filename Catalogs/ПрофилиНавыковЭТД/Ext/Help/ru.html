<h1 class="">Профили навыков</h1>
<p style="margin-left: 0px">Справочник предназначен для описания набора требуемых личных и специальных навыков.</p>
<p style="margin-left: 0px">Для автоматического заполнения навыков в ЭТД требуется выполнить сопоставление профилей навыков должностям либо сотрудникам в регистре <a href="InformationRegister.СопоставлениеПрофилейНавыковЭТД/Help">Сопоставление профилей навыков</a>.</p>
