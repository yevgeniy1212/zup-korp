<h1 class="">Тарифы платежных агентов</h1>
<p style="margin-left: 0px">В справочнике описываются тарифы, согласно которым рассчитывается комиссия (вознаграждение) за денежный перевод по <a href="Catalog.ТарифыПлатежныхАгентов/Help">исполнительному листу</a>.<br>При расчете удержания <b>Вознаграждение платежного агента</b> его сумма будет определена согласно указанному в документе тарифу.</p>
