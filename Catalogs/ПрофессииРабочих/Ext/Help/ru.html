<h1 class="">Профессии рабочих</h1>
<p style="margin-left: 0px">В справочнике перечисляются профессии, которые могут быть указаны при вводе сведений об образовании сотрудников. Профессии можно подобрать в справочник из утвержденного классификатора по кнопке <b>Подбор из ОКПДТР</b>.</p>
