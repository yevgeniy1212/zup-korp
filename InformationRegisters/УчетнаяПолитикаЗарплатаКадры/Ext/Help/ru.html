<h1 class="">Учетная политика зарплата кадры</h1>
<p style="margin-left: 0px"><b>День увольнения является рабочим днем</b> - признак необходимо установить, если в организации день увольнения признается последним рабочим днем сотрудника.<br>Если день увольнения не является последним рабочим днем, то признак должен быть снят.</p>
